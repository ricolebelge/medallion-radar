name: Update TML NFT data

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch: {}       # permet aussi de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python collector.py

      - name: Commit and push data.json
        run: |
          git config user.name "tml-nft-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: update NFT data [skip ci]"
          git push
